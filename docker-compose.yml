services:

  # ── MongoDB ────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sloppy-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"   # expose only for local debugging; remove in prod
    networks:
      - sloppy-net

  # ── App ────────────────────────────────────────────────
  app:
    build: .
    container_name: sloppy-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/sloppy-ai
      SESSION_SECRET: "${SESSION_SECRET}"
      CHATBOX_EMAIL: "${CHATBOX_EMAIL}"
      CHATBOX_PASSWORD: "${CHATBOX_PASSWORD}"
      CHATBOX_MODEL_ID: "${CHATBOX_MODEL_ID}"
      CHATBOX_ROOM_ID: "${CHATBOX_ROOM_ID}"
    depends_on:
      - mongo
    networks:
      - sloppy-net

volumes:
  mongo_data:

networks:
  sloppy-net:
    driver: bridge
